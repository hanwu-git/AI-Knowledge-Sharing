<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI应用分享 - AI 各种工具 日常办公实战教程</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-robot"></i>
            <span>AI应用分享</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">首页</a>
            <a href="#chapters">教程目录</a>
            <a href="#about">关于</a>
        </div>
    </nav>

    <!-- 英雄区 -->
    <header class="hero">
        <div class="hero-content">
            <h1>AI应用分享</h1>
            <p class="hero-subtitle">AI 各种工具 日常办公实战教程</p>
            <p class="hero-desc">用 AI 赋能办公效率，让同事都能轻松上手</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="chapter-count">0</span>
                    <span class="stat-label">个章节</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="category-count">0</span>
                    <span class="stat-label">个类别</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">持续</span>
                    <span class="stat-label">更新中</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container">
        <!-- 筛选栏 -->
        <section class="filter-bar" id="chapters">
            <div class="filter-title">
                <i class="fas fa-list"></i>
                <h2>教程目录</h2>
            </div>
            <div class="filter-options">
                <!-- 筛选按钮由 app.js 自动生成 -->
            </div>
        </section>

        <!-- 章节卡片网格 -->
        <section class="chapters-grid" id="chapters-grid">
            <!-- 章节卡片将通过 JavaScript 动态生成 -->
        </section>
    </main>

    <!-- 关于区域 -->
    <section class="about-section" id="about">
        <div class="about-content">
            <h2><i class="fas fa-info-circle"></i> 关于本教程</h2>
            <p>这是一个持续更新的 WorkBuddy 应用教程库，旨在帮助团队成员快速掌握 AI 在日常办公中的实战技巧。</p>
            <p>每个章节都经过实践验证，图文并茂，确保每位同事都能轻松理解和应用。</p>
            <div class="about-meta">
                <span><i class="fas fa-calendar"></i> 最后更新：<span id="last-updated">2026-06-25</span></span>
                <span><i class="fas fa-user"></i> 维护者：韩午</span>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <p>AI应用分享 © 2025-2026 - 持续更新中</p>
    </footer>

    <script src="scripts/app.js"></script>
</body>
</html>
